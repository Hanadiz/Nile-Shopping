<!-- ============================================
     Nile POS - Enhanced Hero Section Component
     Features: Welcome greeting, stats cards, quick actions, date/time display
     Version: 2.0.0
     ============================================ -->

<section class="hero-section" id="heroSection">
    <div class="hero-overlay"></div>
    
    <div class="hero-content">
        <div class="hero-left">
            <div class="hero-greeting">
                <span class="greeting-icon" id="greetingIcon">🌅</span>
                <div class="greeting-text">
                    <h1 class="hero-title" id="heroTitle">Good Morning, <span id="heroUserName">User</span>!</h1>
                    <p class="hero-subtitle" id="heroSubtitle">Welcome back to Nile POS. Here's your business snapshot.</p>
                </div>
            </div>
            
            <div class="hero-datetime">
                <div class="current-date" id="currentDate"></div>
                <div class="current-time" id="currentTime"></div>
            </div>
        </div>
        
        <div class="hero-right">
            <div class="hero-quick-actions">
                <button class="hero-action" data-action="new-sale">
                    <span class="action-icon">🛒</span>
                    <span>New Sale</span>
                </button>
                <button class="hero-action" data-action="add-customer">
                    <span class="action-icon">👤</span>
                    <span>Add Customer</span>
                </button>
                <button class="hero-action" data-action="scan-barcode">
                    <span class="action-icon">📷</span>
                    <span>Scan Barcode</span>
                </button>
                <button class="hero-action" data-action="view-reports">
                    <span class="action-icon">📊</span>
                    <span>View Reports</span>
                </button>
            </div>
        </div>
    </div>
    
    <div class="hero-stats" id="heroStats">
        <div class="hero-stat-card" data-stat="today-sales">
            <div class="stat-icon">💰</div>
            <div class="stat-info">
                <div class="stat-value" id="statTodaySales">$0</div>
                <div class="stat-label">Today's Sales</div>
                <div class="stat-trend positive" id="salesTrend">+12.5% vs yesterday</div>
            </div>
        </div>
        <div class="hero-stat-card" data-stat="transactions">
            <div class="stat-icon">📋</div>
            <div class="stat-info">
                <div class="stat-value" id="statTransactions">0</div>
                <div class="stat-label">Transactions</div>
                <div class="stat-trend" id="transactionsTrend">0 today</div>
            </div>
        </div>
        <div class="hero-stat-card" data-stat="customers">
            <div class="stat-icon">👥</div>
            <div class="stat-info">
                <div class="stat-value" id="statCustomers">0</div>
                <div class="stat-label">Active Customers</div>
                <div class="stat-trend positive" id="customersTrend">+18 this week</div>
            </div>
        </div>
        <div class="hero-stat-card" data-stat="inventory">
            <div class="stat-icon">📦</div>
            <div class="stat-info">
                <div class="stat-value" id="statLowStock">0</div>
                <div class="stat-label">Low Stock Alerts</div>
                <div class="stat-trend warning" id="lowStockTrend">Needs attention</div>
            </div>
        </div>
    </div>
    
    <div class="hero-announcement" id="heroAnnouncement" style="display: none;">
        <span class="announcement-icon">🎉</span>
        <span class="announcement-text" id="announcementText"></span>
        <button class="announcement-close" id="closeAnnouncement">✕</button>
    </div>
</section>

<style>
    /* Hero section specific styles */
    .hero-section {
        position: relative;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        border-radius: 24px;
        padding: 28px 32px;
        margin-bottom: 24px;
        color: white;
        overflow: hidden;
    }
    
    .hero-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><path fill="white" d="M10,10 L90,10 L90,90 L10,90 Z"/><circle cx="50" cy="50" r="10"/></svg>') repeat;
        pointer-events: none;
    }
    
    .hero-content {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 28px;
        position: relative;
        z-index: 1;
    }
    
    .hero-left {
        flex: 1;
    }
    
    .hero-greeting {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 12px;
    }
    
    .greeting-icon {
        font-size: 48px;
    }
    
    .hero-title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 4px;
    }
    
    .hero-subtitle {
        font-size: 14px;
        opacity: 0.85;
    }
    
    .hero-datetime {
        display: flex;
        gap: 16px;
        margin-top: 12px;
        font-size: 13px;
        opacity: 0.8;
    }
    
    .hero-right {
        min-width: 320px;
    }
    
    .hero-quick-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: flex-end;
    }
    
    .hero-action {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        color: white;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 13px;
        font-weight: 500;
    }
    
    .hero-action:hover {
        background: rgba(255,255,255,0.25);
        transform: translateY(-2px);
    }
    
    .hero-action .action-icon {
        font-size: 16px;
    }
    
    .hero-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
        position: relative;
        z-index: 1;
    }
    
    .hero-stat-card {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        transition: transform 0.2s;
        cursor: pointer;
    }
    
    .hero-stat-card:hover {
        transform: translateY(-2px);
        background: rgba(255,255,255,0.15);
    }
    
    .hero-stat-card .stat-icon {
        font-size: 32px;
    }
    
    .hero-stat-card .stat-info {
        flex: 1;
    }
    
    .hero-stat-card .stat-value {
        font-size: 28px;
        font-weight: 700;
        line-height: 1.2;
    }
    
    .hero-stat-card .stat-label {
        font-size: 12px;
        opacity: 0.8;
        margin-top: 4px;
    }
    
    .hero-stat-card .stat-trend {
        font-size: 10px;
        margin-top: 6px;
        opacity: 0.8;
    }
    
    .stat-trend.positive {
        color: #a7f3d0;
    }
    
    .stat-trend.warning {
        color: #fcd34d;
    }
    
    .hero-announcement {
        margin-top: 20px;
        padding: 12px 16px;
        background: rgba(255,255,255,0.15);
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
        z-index: 1;
    }
    
    .announcement-icon {
        font-size: 20px;
    }
    
    .announcement-text {
        flex: 1;
        font-size: 13px;
    }
    
    .announcement-close {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 16px;
        opacity: 0.7;
    }
    
    .announcement-close:hover {
        opacity: 1;
    }
    
    @media (max-width: 768px) {
        .hero-section {
            padding: 20px;
        }
        
        .hero-title {
            font-size: 22px;
        }
        
        .hero-greeting {
            flex-direction: column;
            text-align: center;
        }
        
        .hero-content {
            flex-direction: column;
        }
        
        .hero-right {
            width: 100%;
        }
        
        .hero-quick-actions {
            justify-content: center;
        }
        
        .hero-stats {
            grid-template-columns: repeat(2, 1fr);
        }
        
        .hero-datetime {
            justify-content: center;
        }
    }
    
    @media (max-width: 480px) {
        .hero-stats {
            grid-template-columns: 1fr;
        }
        
        .hero-action {
            padding: 6px 12px;
            font-size: 11px;
        }
    }
</style>

<script>
    (function() {
        // ============================================
        // HERO CONTROLLER
        // ============================================
        
        const user = JSON.parse(localStorage.getItem('pos_user') || '{"name":"Demo User","role":"cashier","tier":"freemium"}');
        const currency = localStorage.getItem('pos_currency') || 'UGX';
        const exchangeRate = 3700;
        
        // Format money based on currency
        function formatMoney(amountUSD) {
            if (currency === 'UGX') {
                return `UGX ${Math.round(amountUSD * exchangeRate).toLocaleString('en-UG')}`;
            }
            return `$${amountUSD.toFixed(2)}`;
        }
        
        // Update greeting based on time of day
        function updateGreeting() {
            const hour = new Date().getHours();
            const greetingIcon = document.getElementById('greetingIcon');
            const greetingTitle = document.getElementById('heroTitle');
            
            let greeting = 'Good ';
            let icon = '🌅';
            
            if (hour < 12) {
                greeting += 'Morning';
                icon = '🌅';
            } else if (hour < 18) {
                greeting += 'Afternoon';
                icon = '☀️';
            } else {
                greeting += 'Evening';
                icon = '🌙';
            }
            
            greetingIcon.textContent = icon;
            greetingTitle.innerHTML = `${greeting}, <span id="heroUserName">${user.name?.split(' ')[0] || 'User'}</span>!`;
        }
        
        // Update date and time
        function updateDateTime() {
            const now = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', dateOptions);
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', timeOptions);
        }
        
        // Load dashboard stats
        function loadStats() {
            // Demo data - would come from API
            const todaySalesUSD = 1247.50;
            const transactions = 42;
            const customers = 156;
            const lowStock = 8;
            
            document.getElementById('statTodaySales').textContent = formatMoney(todaySalesUSD);
            document.getElementById('statTransactions').textContent = transactions;
            document.getElementById('statCustomers').textContent = customers;
            document.getElementById('statLowStock').textContent = lowStock;
            
            // Update trends
            const salesTrend = document.getElementById('salesTrend');
            if (salesTrend) {
                const percentChange = 12.5;
                salesTrend.innerHTML = percentChange >= 0 ? `+${percentChange}% vs yesterday` : `${percentChange}% vs yesterday`;
                salesTrend.className = `stat-trend ${percentChange >= 0 ? 'positive' : ''}`;
            }
            
            const transactionsTrend = document.getElementById('transactionsTrend');
            if (transactionsTrend) {
                transactionsTrend.innerHTML = `${transactions} today`;
            }
            
            const lowStockTrend = document.getElementById('lowStockTrend');
            if (lowStockTrend) {
                lowStockTrend.innerHTML = lowStock > 0 ? `${lowStock} items need reorder` : 'All stocks healthy';
                lowStockTrend.className = lowStock > 0 ? 'stat-trend warning' : 'stat-trend positive';
            }
        }
        
        // Quick action handlers
        function setupQuickActions() {
            const newSaleBtn = document.querySelector('[data-action="new-sale"]');
            if (newSaleBtn) {
                newSaleBtn.addEventListener('click', () => {
                    window.location.href = '/index.html';
                });
            }
            
            const addCustomerBtn = document.querySelector('[data-action="add-customer"]');
            if (addCustomerBtn) {
                addCustomerBtn.addEventListener('click', () => {
                    window.location.href = '/customer-management.html';
                });
            }
            
            const scanBarcodeBtn = document.querySelector('[data-action="scan-barcode"]');
            if (scanBarcodeBtn) {
                scanBarcodeBtn.addEventListener('click', () => {
                    window.location.href = '/price-check.html';
                });
            }
            
            const viewReportsBtn = document.querySelector('[data-action="view-reports"]');
            if (viewReportsBtn) {
                viewReportsBtn.addEventListener('click', () => {
                    window.location.href = '/reports-custom.html';
                });
            }
        }
        
        // Stat card click handlers
        function setupStatCards() {
            const statCards = document.querySelectorAll('.hero-stat-card');
            const routes = {
                'today-sales': '/reports-custom.html',
                'transactions': '/reports-custom.html',
                'customers': '/customer-management.html',
                'inventory': '/inventory-count.html'
            };
            
            statCards.forEach(card => {
                card.addEventListener('click', () => {
                    const statType = card.dataset.stat;
                    const route = routes[statType];
                    if (route) {
                        window.location.href = route;
                    }
                });
            });
        }
        
        // Announcement system
        function checkAnnouncements() {
            const dismissed = localStorage.getItem('announcement_dismissed');
            const lastDismissDate = localStorage.getItem('announcement_dismissed_date');
            const today = new Date().toDateString();
            
            if (dismissed && lastDismissDate === today) {
                document.getElementById('heroAnnouncement').style.display = 'none';
                return;
            }
            
            // Check for announcements
            const announcements = [
                { id: 'sale', message: '🎉 Summer Sale! 20% off on all electronics. Use code: SUMMER20', expiry: '2024-12-31' },
                { id: 'update', message: '🚀 New version 2.0.0 released! Check out the new features.', expiry: '2024-12-31' }
            ];
            
            const activeAnnouncement = announcements[0];
            if (activeAnnouncement) {
                document.getElementById('announcementText').textContent = activeAnnouncement.message;
                document.getElementById('heroAnnouncement').style.display = 'flex';
            }
        }
        
        // Close announcement
        const closeAnnouncement = document.getElementById('closeAnnouncement');
        if (closeAnnouncement) {
            closeAnnouncement.addEventListener('click', () => {
                document.getElementById('heroAnnouncement').style.display = 'none';
                localStorage.setItem('announcement_dismissed', 'true');
                localStorage.setItem('announcement_dismissed_date', new Date().toDateString());
            });
        }
        
        // Listen for currency changes
        window.addEventListener('currencyChanged', () => {
            loadStats();
        });
        
        // Initialize
        updateGreeting();
        updateDateTime();
        loadStats();
        setupQuickActions();
        setupStatCards();
        checkAnnouncements();
        
        // Update time every second
        setInterval(updateDateTime, 1000);
        
        // Refresh stats every 30 seconds
        setInterval(loadStats, 30000);
        
        // Update greeting on hour change
        setInterval(updateGreeting, 3600000);
    })();
</script>
