<header class="app-header">
    <div class="header-left">
        <button class="mobile-menu-toggle" id="mobileMenuToggle">
            ☰
        </button>
        <h1 class="page-title" id="pageTitle">Dashboard</h1>
    </div>
    
    <div class="header-right">
        <div class="header-search">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search products, customers..." id="globalSearch">
        </div>
        
        <button class="notification-btn" id="notificationBtn">
            🔔
            <span class="notification-badge"></span>
        </button>
        
        <div class="user-dropdown" id="userDropdown">
            <div class="user-dropdown-trigger">
                <div class="user-avatar" id="headerUserAvatar">U</div>
                <span id="headerUserName">User</span>
                <span>▼</span>
            </div>
            <div class="user-dropdown-menu">
                <a href="/profile.html" class="dropdown-item">
                    <span>👤</span> My Profile
                </a>
                <a href="/settings.html" class="dropdown-item" data-permission="settings.view">
                    <span>⚙️</span> Settings
                </a>
                <a href="/security.html" class="dropdown-item">
                    <span>🔒</span> Security
                </a>
                <div class="dropdown-divider"></div>
                <a href="#" id="logoutBtn" class="dropdown-item">
                    <span>🚪</span> Logout
                    <span style="margin-left: auto; font-size: 10px; color: #94a3b8;">Ctrl+Shift+L</span>
                </a>
            </div>
        </div>
    </div>
</header>

<script>
    (function() {
        // Update user info
        const user = JSON.parse(localStorage.getItem('pos_user') || '{"name":"Demo User","role":"cashier"}');
        const userNameSpan = document.getElementById('headerUserName');
        const userAvatar = document.getElementById('headerUserAvatar');
        
        if (userNameSpan) userNameSpan.textContent = user.name || user.email?.split('@')[0] || 'User';
        if (userAvatar) userAvatar.textContent = (user.name?.charAt(0) || 'U').toUpperCase();
        
        // Logout handler
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (confirm('Are you sure you want to logout?')) {
                    window.location.href = '/logout.html';
                }
            });
        }
        
        // Global search
        const searchInput = document.getElementById('globalSearch');
        if (searchInput) {
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && e.target.value.length > 2) {
                    window.location.href = `/search.html?q=${encodeURIComponent(e.target.value)}`;
                }
            });
        }
    })();
</script>
