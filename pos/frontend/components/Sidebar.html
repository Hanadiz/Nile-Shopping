            <div class="user-role" id="sidebarUserRole">cashier</div>

<script>
    // Sidebar initialization with RBAC
    (function() {
        // Update user info
        const user = JSON.parse(localStorage.getItem('pos_user') || '{}');
        const userNameSpan = document.getElementById('sidebarUserName');
        const userRoleSpan = document.getElementById('sidebarUserRole');
        const userAvatar = document.getElementById('sidebarUserAvatar');
        
        if (userNameSpan) userNameSpan.textContent = user.name || user.email?.split('@')[0] || 'User';
        if (userRoleSpan) userRoleSpan.textContent = user.role?.toUpperCase() || 'Cashier';
        if (userAvatar) userAvatar.textContent = (user.name?.charAt(0) || 'U').toUpperCase();
        
        // Apply RBAC filtering
        if (window.rbac) {
            // Hide menu items without permission
            document.querySelectorAll('.nav-item[data-permission]').forEach(item => {
                const requiredPerm = item.dataset.permission;
                if (!window.rbac.hasPermission(requiredPerm)) {
                    item.style.display = 'none';
                }
            });
            
            // Hide tier-locked items
            document.querySelectorAll('.nav-item[data-tier]').forEach(item => {
                const requiredTier = item.dataset.tier;
                const userTier = user.tier || 'freemium';
                const tierLevels = { freemium: 0, basic: 1, professional: 2, premium: 3, enterprise: 4 };
                if (tierLevels[userTier] < tierLevels[requiredTier]) {
                    item.style.display = 'none';
                }
            });
            
            // Hide role-locked items
            document.querySelectorAll('.nav-item[data-role]').forEach(item => {
                const requiredRole = item.dataset.role;
                if (!window.rbac.isAtLeast(requiredRole)) {
                    item.style.display = 'none';
                }
            });
        }
        
        // Set active nav item based on current URL
        const currentPath = window.location.pathname;
        document.querySelectorAll('.nav-item').forEach(item => {
            const href = item.getAttribute('href');
            if (href && currentPath.includes(href)) {
                item.classList.add('active');
            }
        });
        
        // Offline status badge
        window.addEventListener('offline', () => {
            const offlineBadge = document.getElementById('offlineBadgeNav');
            if (offlineBadge) offlineBadge.style.display = 'inline-flex';
        });
        
        window.addEventListener('online', () => {
            const offlineBadge = document.getElementById('offlineBadgeNav');
            if (offlineBadge) offlineBadge.style.display = 'none';
        });
    })();
</script>
