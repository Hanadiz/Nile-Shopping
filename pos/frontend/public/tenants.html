<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile POS - Multi-Tenant Management</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            padding: 24px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        h1 { font-size: 24px; color: #1e293b; }
        .back-btn, .new-btn {
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .back-btn { background: white; border: 1px solid #e2e8f0; text-decoration: none; color: #475569; }
        .new-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; font-weight: 600; }
        .tenant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .tenant-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .tenant-header { padding: 20px; background: #1e293b; color: white; }
        .tenant-body { padding: 20px; }
        .stats { display: flex; justify-content: space-between; margin: 12px 0; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
        }
        .modal-header { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 Multi-Tenant Management</h1>
            <div style="display: flex; gap: 12px;">
                <a href="/index.html" class="back-btn">← Back</a>
                <button class="new-btn" id="newTenantBtn">+ Add Franchise</button>
            </div>
        </div>
        <div class="tenant-grid" id="tenantGrid"></div>
    </div>

    <div id="tenantModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Add Franchise / Tenant</h3><button class="close-modal">✕</button></div>
            <div class="modal-body">
                <form id="tenantForm">
                    <div class="form-group"><label>Store Name</label><input type="text" id="name" required></div>
                    <div class="form-group"><label>Location / Address</label><input type="text" id="location"></div>
                    <div class="form-group"><label>Admin Email</label><input type="email" id="adminEmail" required></div>
                    <div class="form-group"><label>Plan</label>
                        <select id="plan"><option value="basic">Basic</option><option value="professional">Professional</option><option value="premium">Premium</option></select>
                    </div>
                    <button type="submit" class="new-btn" style="width:100%;">Create Tenant</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let tenants = [
                { id: 1, name: 'Nile Downtown', location: '123 Main St', adminEmail: 'downtown@nile.com', plan: 'premium', status: 'active', stores: 3, users: 12, sales: 28450.00 },
                { id: 2, name: 'Nile Mall', location: 'Westfield Mall', adminEmail: 'mall@nile.com', plan: 'professional', status: 'active', stores: 2, users: 8, sales: 18720.00 },
                { id: 3, name: 'Nile Airport', location: 'Terminal B', adminEmail: 'airport@nile.com', plan: 'basic', status: 'active', stores: 1, users: 4, sales: 8930.00 }
            ];
            let nextId = 4;
            
            function renderTenants() {
                const grid = document.getElementById('tenantGrid');
                grid.innerHTML = tenants.map(tenant => `
                    <div class="tenant-card">
                        <div class="tenant-header">
                            <div style="font-weight:700;">${tenant.name}</div>
                            <div style="font-size:12px;">${tenant.location}</div>
                        </div>
                        <div class="tenant-body">
                            <div class="stats"><span>📧 Admin:</span><span>${tenant.adminEmail}</span></div>
                            <div class="stats"><span>📊 Plan:</span><span>${tenant.plan.toUpperCase()}</span></div>
                            <div class="stats"><span>🏪 Stores:</span><span>${tenant.stores}</span></div>
                            <div class="stats"><span>👥 Users:</span><span>${tenant.users}</span></div>
                            <div class="stats"><span>💰 Sales (MTD):</span><span>$${tenant.sales.toFixed(2)}</span></div>
                        </div>
                    </div>
                `).join('');
            }
            
            function addTenant(event) {
                event.preventDefault();
                const newTenant = {
                    id: nextId++,
                    name: document.getElementById('name').value,
                    location: document.getElementById('location').value,
                    adminEmail: document.getElementById('adminEmail').value,
                    plan: document.getElementById('plan').value,
                    status: 'active',
                    stores: 1,
                    users: 1,
                    sales: 0
                };
                tenants.push(newTenant);
                renderTenants();
                document.getElementById('tenantModal').classList.remove('active');
                document.getElementById('tenantForm').reset();
                alert(`Franchise ${newTenant.name} created!`);
            }
            
            function init() {
                renderTenants();
                document.getElementById('newTenantBtn').addEventListener('click', () => {
                    document.getElementById('tenantModal').classList.add('active');
                });
                document.getElementById('tenantForm').addEventListener('submit', addTenant);
                document.querySelectorAll('.close-modal').forEach(btn => {
                    btn.addEventListener('click', () => document.getElementById('tenantModal').classList.remove('active'));
                });
            }
            
            init();
        })();
    </script>
</body>
</html>
