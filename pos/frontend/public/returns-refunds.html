<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile POS - Returns & Refunds</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            padding: 24px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        h1 { font-size: 24px; color: #1e293b; }
        .back-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            color: #475569;
        }
        .search-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .search-box input {
            flex: 1;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
        }
        .search-box button {
            padding: 14px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .transaction-info {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        .transaction-info.show { display: block; }
        .items-list {
            margin: 20px 0;
        }
        .return-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .return-item select {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .refund-summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }
        .process-btn {
            width: 100%;
            padding: 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 8px;
        }
        @media (max-width: 768px) {
            .return-item { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔄 Returns & Refunds</h1>
            <a href="/index.html" class="back-btn">← Back to Register</a>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="receiptNumber" placeholder="Enter receipt/transaction number" autofocus>
                <button id="searchTransactionBtn">Search Transaction</button>
            </div>
            <div class="warning">
                ⚠️ Returns are subject to store policy. Items must be in original condition within 30 days.
            </div>
        </div>

        <div id="transactionInfo" class="transaction-info">
            <h3>Transaction Details</h3>
            <div id="transactionDetails"></div>
            <div class="items-list" id="itemsList"></div>
            <div class="refund-summary">
                <div style="display: flex; justify-content: space-between;">
                    <span>Refund Amount:</span>
                    <span id="refundAmount" style="font-size: 24px; font-weight: 700;">$0.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 12px;">
                    <span>Refund Method:</span>
                    <select id="refundMethod" style="padding: 8px; border-radius: 8px;">
                        <option value="original">Original Payment Method</option>
                        <option value="store_credit">Store Credit</option>
                        <option value="gift_card">Gift Card</option>
                    </select>
                </div>
                <button class="process-btn" id="processRefundBtn">Process Refund</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Demo transaction data
            const demoTransactions = {
                'TRX-001': {
                    number: 'TRX-001',
                    date: '2024-01-15 14:30:00',
                    customer: 'John Doe',
                    subtotal: 129.97,
                    tax: 13.00,
                    total: 142.97,
                    items: [
                        { id: 1, name: 'Classic T-Shirt', sku: 'PRD-001', price: 29.99, quantity: 1, returnable: true },
                        { id: 3, name: 'Running Shoes', sku: 'PRD-003', price: 89.99, quantity: 1, returnable: true },
                        { id: 5, name: 'Phone Case', sku: 'PRD-011', price: 9.99, quantity: 1, returnable: false }
                    ]
                },
                'TRX-002': {
                    number: 'TRX-002',
                    date: '2024-01-14 10:15:00',
                    customer: 'Jane Smith',
                    subtotal: 199.99,
                    tax: 20.00,
                    total: 219.99,
                    items: [
                        { id: 5, name: 'Smart Watch', sku: 'PRD-005', price: 199.99, quantity: 1, returnable: true }
                    ]
                }
            };

            let currentTransaction = null;
            let selectedReturns = {};

            function displayTransaction() {
                if (!currentTransaction) return;
                
                const details = document.getElementById('transactionDetails');
                details.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(2,1fr); gap:12px; margin-bottom:20px;">
                        <div><strong>Receipt #:</strong> ${currentTransaction.number}</div>
                        <div><strong>Date:</strong> ${currentTransaction.date}</div>
                        <div><strong>Customer:</strong> ${currentTransaction.customer}</div>
                        <div><strong>Original Total:</strong> $${currentTransaction.total.toFixed(2)}</div>
                    </div>
                `;
                
                const itemsHtml = currentTransaction.items.map(item => `
                    <div class="return-item">
                        <div>
                            <strong>${escapeHtml(item.name)}</strong><br>
                            <small>${item.sku} | $${item.price.toFixed(2)}</small>
                        </div>
                        <div>
                            ${item.returnable ? `
                                <select data-item-id="${item.id}" class="return-qty">
                                    <option value="0">Not Returning</option>
                                    <option value="1">Return 1</option>
                                    ${item.quantity > 1 ? `<option value="${item.quantity}">Return All (${item.quantity})</option>` : ''}
                                </select>
                            ` : '<span style="color:#ef4444;">Not returnable</span>'}
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('itemsList').innerHTML = itemsHtml;
                
                // Add event listeners to quantity selects
                document.querySelectorAll('.return-qty').forEach(select => {
                    select.addEventListener('change', (e) => {
                        const itemId = parseInt(select.dataset.itemId);
                        const qty = parseInt(select.value);
                        const item = currentTransaction.items.find(i => i.id === itemId);
                        if (qty > 0) {
                            selectedReturns[itemId] = { ...item, returnQty: qty };
                        } else {
                            delete selectedReturns[itemId];
                        }
                        updateRefundAmount();
                    });
                });
                
                document.getElementById('transactionInfo').classList.add('show');
                updateRefundAmount();
            }

            function updateRefundAmount() {
                let totalRefund = 0;
                for (const item of Object.values(selectedReturns)) {
                    totalRefund += item.price * item.returnQty;
                }
                document.getElementById('refundAmount').textContent = `$${totalRefund.toFixed(2)}`;
            }

            function searchTransaction() {
                const receiptNum = document.getElementById('receiptNumber').value.trim().toUpperCase();
                
                if (demoTransactions[receiptNum]) {
                    currentTransaction = demoTransactions[receiptNum];
                    selectedReturns = {};
                    displayTransaction();
                    showToast('Transaction found', 'success');
                } else {
                    showToast('Transaction not found', 'error');
                    document.getElementById('transactionInfo').classList.remove('show');
                }
            }

            function processRefund() {
                if (Object.keys(selectedReturns).length === 0) {
                    showToast('Please select items to return', 'error');
                    return;
                }
                
                const refundAmount = Object.values(selectedReturns).reduce((sum, item) => sum + (item.price * item.returnQty), 0);
                const refundMethod = document.getElementById('refundMethod').value;
                
                showToast(`Refund of $${refundAmount.toFixed(2)} processed via ${refundMethod}.`, 'success');
                
                // Update cart in localStorage for exchange (optional)
                const cart = Object.values(selectedReturns).map(item => ({
                    id: item.id,
                    name: item.name,
                    sku: item.sku,
                    price: item.price,
                    quantity: item.returnQty,
                    lineTotal: item.price * item.returnQty,
                    isReturn: true
                }));
                
                if (cart.length > 0) {
                    localStorage.setItem('pos_return_cart', JSON.stringify(cart));
                    if (confirm('Would you like to process an exchange (new sale) instead?')) {
                        window.location.href = '/index.html?mode=exchange';
                    }
                }
                
                // Reset form
                document.getElementById('receiptNumber').value = '';
                document.getElementById('transactionInfo').classList.remove('show');
                currentTransaction = null;
                selectedReturns = {};
            }

            function showToast(message, type) {
                const toast = document.createElement('div');
                toast.textContent = message;
                toast.style.cssText = `
                    position: fixed; bottom: 20px; right: 20px;
                    background: ${type === 'error' ? '#ef4444' : '#10b981'};
                    color: white; padding: 12px 20px; border-radius: 12px;
                    z-index: 1000; animation: slideIn 0.3s ease;
                `;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function init() {
                document.getElementById('searchTransactionBtn').addEventListener('click', searchTransaction);
                document.getElementById('processRefundBtn').addEventListener('click', processRefund);
                document.getElementById('receiptNumber').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') searchTransaction();
                });
            }
            
            init();
        })();
    </script>
</body>
</html>
