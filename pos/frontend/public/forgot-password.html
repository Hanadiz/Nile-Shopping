<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile POS - Reset Password</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .reset-container {
            background: white;
            border-radius: 32px;
            max-width: 450px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .header {
            background: #1e293b;
            color: white;
            padding: 32px;
            text-align: center;
        }
        .header h2 { font-size: 24px; margin-bottom: 8px; }
        .header p { font-size: 13px; opacity: 0.8; }
        .body { padding: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #1e293b; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            margin-top: 12px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a { color: #2563eb; text-decoration: none; font-size: 13px; }
        .success-message {
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        .show { display: block; }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .password-strength {
            margin-top: 8px;
            font-size: 11px;
        }
        .strength-weak { color: #dc2626; }
        .strength-medium { color: #f59e0b; }
        .strength-strong { color: #10b981; }
        .resend-timer {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="header">
            <h2>🔐 Reset Password</h2>
            <p>Enter your email to receive a reset link</p>
        </div>
        <div class="body">
            <div id="step1">
                <div id="step1Error" class="error-message"></div>
                <div id="step1Success" class="success-message"></div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" placeholder="cashier@nile.com" autocomplete="email">
                </div>
                <button id="sendResetBtn" class="btn">Send Reset Link</button>
                <div class="back-link">
                    <a href="/login.html">← Back to Login</a>
                </div>
                <div id="resendTimer" class="resend-timer"></div>
            </div>

            <div id="step2" style="display: none;">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password">
                    <div id="passwordStrength" class="password-strength"></div>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" placeholder="Confirm new password">
                </div>
                <div id="resetToken" style="display: none;"></div>
                <button id="resetPasswordBtn" class="btn">Reset Password</button>
                <div class="back-link">
                    <a href="/login.html">← Back to Login</a>
                </div>
            </div>

            <div id="step3" style="display: none; text-align: center;">
                <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
                <h3>Password Reset Successful!</h3>
                <p style="margin: 16px 0; color: #64748b;">Your password has been changed. You can now log in with your new password.</p>
                <a href="/login.html" class="btn" style="display: inline-block; text-decoration: none; text-align: center;">Login Now</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let resetTokenValid = false;
            let resendCooldown = 0;
            
            function checkPasswordStrength(password) {
                let strength = 0;
                if (password.length >= 8) strength++;
                if (password.match(/[A-Z]/)) strength++;
                if (password.match(/[0-9]/)) strength++;
                if (password.match(/[^A-Za-z0-9]/)) strength++;
                
                if (strength <= 1) return { text: 'Weak', class: 'strength-weak' };
                if (strength <= 2) return { text: 'Medium', class: 'strength-medium' };
                return { text: 'Strong', class: 'strength-strong' };
            }
            
            document.getElementById('newPassword')?.addEventListener('input', (e) => {
                const strength = checkPasswordStrength(e.target.value);
                const strengthDiv = document.getElementById('passwordStrength');
                strengthDiv.innerHTML = `Password strength: <span class="${strength.class}">${strength.text}</span>`;
            });
            
            async function sendResetLink() {
                const email = document.getElementById('resetEmail').value.trim();
                const errorDiv = document.getElementById('step1Error');
                const successDiv = document.getElementById('step1Success');
                
                if (!email) {
                    errorDiv.textContent = 'Please enter your email address';
                    errorDiv.classList.add('show');
                    return;
                }
                if (!email.includes('@') || !email.includes('.')) {
                    errorDiv.textContent = 'Please enter a valid email address';
                    errorDiv.classList.add('show');
                    return;
                }
                
                errorDiv.classList.remove('show');
                const btn = document.getElementById('sendResetBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> Sending...';
                
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                if (email === 'demo@nile.com' || email === 'admin@nile.com' || email === 'cashier@nile.com') {
                    successDiv.textContent = `Reset link sent to ${email}. Check your inbox.`;
                    successDiv.classList.add('show');
                    resetTokenValid = true;
                    resendCooldown = 60;
                    startResendTimer();
                    
                    // For demo, auto-redirect to reset
                    setTimeout(() => {
                        document.getElementById('step1').style.display = 'none';
                        document.getElementById('step2').style.display = 'block';
                        document.getElementById('resetEmailDisplay').textContent = email;
                    }, 2000);
                } else {
                    errorDiv.textContent = 'No account found with this email address.';
                    errorDiv.classList.add('show');
                }
                
                btn.disabled = false;
                btn.innerHTML = 'Send Reset Link';
            }
            
            function startResendTimer() {
                const timerDiv = document.getElementById('resendTimer');
                const interval = setInterval(() => {
                    if (resendCooldown <= 0) {
                        clearInterval(interval);
                        timerDiv.innerHTML = '';
                    } else {
                        timerDiv.innerHTML = `You can request another reset link in ${resendCooldown} seconds`;
                        resendCooldown--;
                    }
                }, 1000);
            }
            
            async function resetPassword() {
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmNewPassword').value;
                const errorDiv = document.getElementById('step1Error');
                
                if (!newPassword || !confirmPassword) {
                    errorDiv.textContent = 'Please enter and confirm your new password';
                    errorDiv.classList.add('show');
                    return;
                }
                if (newPassword.length < 8) {
                    errorDiv.textContent = 'Password must be at least 8 characters';
                    errorDiv.classList.add('show');
                    return;
                }
                if (newPassword !== confirmPassword) {
                    errorDiv.textContent = 'Passwords do not match';
                    errorDiv.classList.add('show');
                    return;
                }
                
                errorDiv.classList.remove('show');
                const btn = document.getElementById('resetPasswordBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> Resetting...';
                
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                document.getElementById('step2').style.display = 'none';
                document.getElementById('step3').style.display = 'block';
            }
            
            document.getElementById('sendResetBtn')?.addEventListener('click', sendResetLink);
            document.getElementById('resetPasswordBtn')?.addEventListener('click', resetPassword);
            document.getElementById('resetEmail')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendResetLink();
            });
        })();
    </script>
</body>
</html>
