<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Nile POS</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="/assets/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">Nile<span>POS</span></div>
            <div class="tagline">Reset your password</div>
        </div>
        
        <div class="auth-body">
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="forgotForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" placeholder="Enter your registered email" required>
                    </div>
                </div>
                <button type="submit" class="btn" id="resetBtn">Send Reset Link</button>
            </form>
            
            <div class="auth-footer">
                <a href="/login.html">← Back to Login</a>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('forgotForm');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const resetBtn = document.getElementById('resetBtn');
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
            setTimeout(() => successDiv.classList.remove('show'), 5000);
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                showError('Please enter your email address');
                return;
            }
            
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="loading-spinner"></span> Sending...';
            
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // Demo: always success
            showSuccess(`Password reset link sent to ${email}. Check your inbox.`);
            localStorage.setItem('reset_email', email);
            
            resetBtn.disabled = false;
            resetBtn.innerHTML = 'Send Reset Link';
            
            setTimeout(() => {
                window.location.href = '/login.html';
            }, 3000);
        });
    </script>
</body>
</html>
