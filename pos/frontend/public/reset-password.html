<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Nile POS</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="/assets/css/auth.css">
    <style>
        .reset-info {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">Nile<span>POS</span></div>
            <div class="tagline">Create new password</div>
        </div>
        
        <div class="auth-body">
            <div class="reset-info" id="resetInfo">
                🔐 Resetting password for: <strong id="resetEmail">—</strong>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="resetForm">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                    </div>
                    <div id="passwordStrength" class="password-strength"></div>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                </div>
                <button type="submit" class="btn" id="resetBtn">Reset Password</button>
            </form>
            
            <div class="auth-footer">
                <a href="/login.html">← Back to Login</a>
            </div>
        </div>
    </div>
    
    <script>
        // Get email from URL or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        let resetEmail = urlParams.get('email') || localStorage.getItem('reset_email') || 'your email';
        
        document.getElementById('resetEmail').textContent = resetEmail;
        
        // Password strength checker
        const newPassword = document.getElementById('newPassword');
        const strengthDiv = document.getElementById('passwordStrength');
        
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^A-Za-z0-9]/)) strength++;
            
            if (strength <= 1) return { text: 'Weak', class: 'strength-weak' };
            if (strength <= 2) return { text: 'Medium', class: 'strength-medium' };
            return { text: 'Strong', class: 'strength-strong' };
        }
        
        newPassword.addEventListener('input', (e) => {
            const strength = checkPasswordStrength(e.target.value);
            strengthDiv.innerHTML = `Password strength: <span class="${strength.class}">${strength.text}</span>`;
        });
        
        // Form submission
        const form = document.getElementById('resetForm');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const resetBtn = document.getElementById('resetBtn');
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
            setTimeout(() => successDiv.classList.remove('show'), 3000);
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPwd = newPassword.value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            
            if (newPwd !== confirmPwd) {
                showError('Passwords do not match');
                return;
            }
            
            if (newPwd.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }
            
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="loading-spinner"></span> Resetting...';
            
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            showSuccess('Password has been reset successfully! Redirecting to login...');
            localStorage.removeItem('reset_email');
            
            setTimeout(() => {
                window.location.href = '/login.html';
            }, 2000);
        });
    </script>
</body>
</html>
