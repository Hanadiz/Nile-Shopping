
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile POS - Layaway Management</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            padding: 24px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        h1 { font-size: 24px; color: #1e293b; }
        .back-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            color: #475569;
        }
        .new-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: 700; color: #667eea; }
        .layaway-table {
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; font-weight: 600; }
        .status-active { background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 100px; font-size: 11px; display: inline-block; }
        .status-overdue { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 100px; font-size: 11px; display: inline-block; }
        .status-completed { background: #e2e8f0; color: #475569; padding: 4px 8px; border-radius: 100px; font-size: 11px; display: inline-block; }
        .view-btn {
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .payment-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
        .make-payment {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 12px;
        }
        @media (max-width: 768px) {
            th, td { font-size: 12px; padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Layaway Management</h1>
            <div style="display: flex; gap: 12px;">
                <a href="/index.html" class="back-btn">← Back</a>
                <button class="new-btn" id="newLayawayBtn">+ New Layaway</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="activeCount">0</div><div class="stat-label">Active Layaways</div></div>
            <div class="stat-card"><div class="stat-value" id="totalValue">$0</div><div class="stat-label">Total Value</div></div>
            <div class="stat-card"><div class="stat-value" id="remainingBalance">$0</div><div class="stat-label">Remaining Balance</div></div>
            <div class="stat-card"><div class="stat-value" id="overdueCount">0</div><div class="stat-label">Overdue</div></div>
        </div>

        <div class="layaway-table">
            <table>
                <thead>
                    <tr><th>ID</th><th>Customer</th><th>Total</th><th>Paid</th><th>Balance</th><th>Due Date</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="layawayTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Layaway Modal -->
    <div id="layawayModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3 id="modalTitle">New Layaway</h3><button class="close-modal">✕</button></div>
            <div class="modal-body">
                <form id="layawayForm">
                    <div class="form-group"><label>Customer Name</label><input type="text" id="customerName" required></div>
                    <div class="form-group"><label>Customer Phone</label><input type="text" id="customerPhone"></div>
                    <div class="form-group"><label>Total Amount</label><input type="number" id="totalAmount" step="0.01" required></div>
                    <div class="form-group"><label>Deposit (%)</label><input type="number" id="depositPercent" value="20" step="5"></div>
                    <div class="form-group"><label>Due Date</label><input type="date" id="dueDate" required></div>
                    <div class="form-group"><label>Notes</label><textarea id="notes" rows="2"></textarea></div>
                    <button type="submit" class="new-btn" style="width:100%;">Create Layaway</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Make Payment</h3><button class="close-modal">✕</button></div>
            <div class="modal-body">
                <div id="paymentInfo"></div>
                <div class="form-group"><label>Payment Amount</label><input type="number" id="paymentAmount" step="0.01" placeholder="0.00"></div>
                <div class="form-group"><label>Payment Method</label>
                    <select id="paymentMethod"><option value="cash">Cash</option><option value="card">Card</option></select>
                </div>
                <button id="submitPaymentBtn" class="make-payment">Process Payment</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let layaways = [
                { id: 'LAY-001', customerName: 'John Doe', customerPhone: '555-0101', total: 299.99, paid: 100.00, balance: 199.99, dueDate: '2024-02-15', status: 'active', notes: '', payments: [{ date: '2024-01-15', amount: 100.00 }] },
                { id: 'LAY-002', customerName: 'Jane Smith', customerPhone: '555-0102', total: 89.99, paid: 50.00, balance: 39.99, dueDate: '2024-01-20', status: 'overdue', notes: '', payments: [{ date: '2024-01-10', amount: 50.00 }] }
            ];
            let nextId = 3;
            let currentLayaway = null;

            function updateStats() {
                const active = layaways.filter(l => l.status === 'active').length;
                const totalValue = layaways.reduce((s, l) => s + l.total, 0);
                const remainingBalance = layaways.reduce((s, l) => s + l.balance, 0);
                const overdue = layaways.filter(l => l.status === 'overdue').length;
                
                document.getElementById('activeCount').textContent = active;
                document.getElementById('totalValue').textContent = `$${totalValue.toFixed(2)}`;
                document.getElementById('remainingBalance').textContent = `$${remainingBalance.toFixed(2)}`;
                document.getElementById('overdueCount').textContent = overdue;
            }

            function renderLayaways() {
                const tbody = document.getElementById('layawayTableBody');
                tbody.innerHTML = layaways.map(l => `
                    <tr>
                        <td>${l.id}</td>
                        <td>${l.customerName}</td>
                        <td>$${l.total.toFixed(2)}</td>
                        <td>$${l.paid.toFixed(2)}</td>
                        <td>$${l.balance.toFixed(2)}</td>
                        <td>${l.dueDate}</td>
                        <td><span class="status-${l.status}">${l.status}</span></td>
                        <td><button class="view-btn" data-id="${l.id}">View/Pay</button></td>
                    </tr>
                `).join('');
                
                document.querySelectorAll('.view-btn').forEach(btn => {
                    btn.addEventListener('click', () => viewLayaway(btn.dataset.id));
                });
            }

            function viewLayaway(id) {
                currentLayaway = layaways.find(l => l.id === id);
                if (!currentLayaway) return;
                
                const paymentHistory = currentLayaway.payments.map(p => `<div class="payment-row"><span>${p.date}</span><span>$${p.amount.toFixed(2)}</span></div>`).join('');
                
                document.getElementById('paymentInfo').innerHTML = `
                    <div><strong>${currentLayaway.customerName}</strong> (${currentLayaway.customerPhone})</div>
                    <div>Total: $${currentLayaway.total.toFixed(2)} | Paid: $${currentLayaway.paid.toFixed(2)} | Balance: $${currentLayaway.balance.toFixed(2)}</div>
                    <div>Due: ${currentLayaway.dueDate}</div>
                    <div style="margin-top:16px;"><strong>Payment History:</strong></div>
                    ${paymentHistory || '<div>No payments yet</div>'}
                `;
                document.getElementById('paymentAmount').value = '';
                document.getElementById('paymentModal').classList.add('active');
            }

            function makePayment() {
                if (!currentLayaway) return;
                
                const amount = parseFloat(document.getElementById('paymentAmount').value);
                if (isNaN(amount) || amount <= 0) {
                    alert('Enter a valid payment amount');
                    return;
                }
                if (amount > currentLayaway.balance) {
                    alert(`Payment cannot exceed balance of $${currentLayaway.balance.toFixed(2)}`);
                    return;
                }
                
                currentLayaway.paid += amount;
                currentLayaway.balance -= amount;
                currentLayaway.payments.push({ date: new Date().toISOString().split('T')[0], amount: amount });
                
                if (currentLayaway.balance <= 0) {
                    currentLayaway.status = 'completed';
                    alert('Layaway fully paid! Customer can pick up items.');
                } else {
                    // Check if overdue
                    const today = new Date().toISOString().split('T')[0];
                    if (currentLayaway.dueDate < today && currentLayaway.balance > 0) {
                        currentLayaway.status = 'overdue';
                    }
                }
                
                const index = layaways.findIndex(l => l.id === currentLayaway.id);
                layaways[index] = currentLayaway;
                
                updateStats();
                renderLayaways();
                document.getElementById('paymentModal').classList.remove('active');
                alert(`Payment of $${amount.toFixed(2)} received. Remaining balance: $${currentLayaway.balance.toFixed(2)}`);
            }

            function createLayaway(event) {
                event.preventDefault();
                
                const total = parseFloat(document.getElementById('totalAmount').value);
                const depositPercent = parseFloat(document.getElementById('depositPercent').value);
                const deposit = total * (depositPercent / 100);
                
                const newLayaway = {
                    id: `LAY-${String(nextId++).padStart(3, '0')}`,
                    customerName: document.getElementById('customerName').value,
                    customerPhone: document.getElementById('customerPhone').value,
                    total: total,
                    paid: deposit,
                    balance: total - deposit,
                    dueDate: document.getElementById('dueDate').value,
                    status: 'active',
                    notes: document.getElementById('notes').value,
                    payments: [{ date: new Date().toISOString().split('T')[0], amount: deposit }]
                };
                
                layaways.push(newLayaway);
                updateStats();
                renderLayaways();
                document.getElementById('layawayModal').classList.remove('active');
                document.getElementById('layawayForm').reset();
                alert(`Layaway created! Deposit: $${deposit.toFixed(2)}. Balance due: $${newLayaway.balance.toFixed(2)}`);
            }

            function init() {
                updateStats();
                renderLayaways();
                
                document.getElementById('newLayawayBtn').addEventListener('click', () => {
                    document.getElementById('layawayForm').reset();
                    document.getElementById('dueDate').value = new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0];
                    document.getElementById('layawayModal').classList.add('active');
                });
                document.getElementById('layawayForm').addEventListener('submit', createLayaway);
                document.getElementById('submitPaymentBtn').addEventListener('click', makePayment);
                
                document.querySelectorAll('.close-modal').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
                    });
                });
            }
            
            init();
        })();
    </script>
</body>
</html>
