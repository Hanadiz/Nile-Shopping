<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile POS - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loading-container {
            text-align: center;
            color: white;
        }
        
        .logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease;
        }
        
        .logo span {
            color: #60a5fa;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        .loading-text {
            font-size: 14px;
            opacity: 0.8;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="logo">Nile<span>POS</span></div>
        <div class="spinner"></div>
        <div class="loading-text">Redirecting to secure login...</div>
    </div>
    
    <script>
        // Main entry point - redirect to login page
        // Check if user is already logged in
        const token = localStorage.getItem('pos_jwt');
        const sessionExpiry = localStorage.getItem('pos_session_expiry');
        
        if (token && sessionExpiry && new Date(sessionExpiry) > new Date()) {
            // User is already logged in, redirect to dashboard
            window.location.href = '/dashboard.html';
        } else {
            // Clear any stale data and redirect to login
            localStorage.removeItem('pos_jwt');
            localStorage.removeItem('pos_user');
            localStorage.removeItem('pos_session_expiry');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
