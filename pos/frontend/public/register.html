<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Nile POS</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="/assets/css/auth.css">
    <style>
        .plan-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .plan-option {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .plan-option.selected {
            border-color: var(--primary);
            background: #eff6ff;
        }
        .plan-name {
            font-weight: 700;
            font-size: 14px;
        }
        .plan-price {
            font-size: 12px;
            color: var(--gray);
        }
        .terms {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
        }
        .terms input {
            width: auto;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">Nile<span>POS</span></div>
            <div class="tagline">Start your 14-day free trial</div>
        </div>
        
        <div class="auth-body">
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="firstName" placeholder="John" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="lastName" placeholder="Doe" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email Address *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📞</span>
                        <input type="tel" id="phone" placeholder="+256 XXX XXX XXX">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Store/Business Name *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🏪</span>
                        <input type="text" id="storeName" placeholder="My Store" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Country</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🌍</span>
                        <select id="country">
                            <option value="UG">Uganda</option>
                            <option value="KE">Kenya</option>
                            <option value="TZ">Tanzania</option>
                            <option value="UK">United Kingdom</option>
                            <option value="US">United States</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Password *</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" placeholder="Create a strong password" required>
                        </div>
                        <div id="passwordStrength" class="password-strength"></div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password *</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                        </div>
                    </div>
                </div>
                
                <label>Select Plan</label>
                <div class="plan-selector">
                    <div class="plan-option" data-plan="freemium">
                        <div class="plan-name">Freemium</div>
                        <div class="plan-price">$0 / forever</div>
                    </div>
                    <div class="plan-option" data-plan="basic">
                        <div class="plan-name">Basic</div>
                        <div class="plan-price">$29 / month</div>
                    </div>
                    <div class="plan-option" data-plan="professional">
                        <div class="plan-name">Professional</div>
                        <div class="plan-price">$79 / month</div>
                    </div>
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="termsAgree" required>
                    <label style="margin: 0;">I agree to the <a href="/terms.html" target="_blank">Terms of Service</a> and <a href="/privacy.html" target="_blank">Privacy Policy</a></label>
                </div>
                
                <button type="submit" class="btn" id="registerBtn">Create Account</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="/login.html">Sign in</a>
            </div>
        </div>
    </div>
    
    <script>
        (function() {
            // Plan selection
            let selectedPlan = 'freemium';
            document.querySelectorAll('.plan-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    document.querySelectorAll('.plan-option').forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedPlan = opt.dataset.plan;
                });
            });
            document.querySelector('.plan-option').classList.add('selected');
            
            // Password strength checker
            const passwordInput = document.getElementById('password');
            const strengthDiv = document.getElementById('passwordStrength');
            
            function checkPasswordStrength(password) {
                let strength = 0;
                if (password.length >= 8) strength++;
                if (password.match(/[A-Z]/)) strength++;
                if (password.match(/[0-9]/)) strength++;
                if (password.match(/[^A-Za-z0-9]/)) strength++;
                
                if (strength <= 1) return { text: 'Weak', class: 'strength-weak' };
                if (strength <= 2) return { text: 'Medium', class: 'strength-medium' };
                return { text: 'Strong', class: 'strength-strong' };
            }
            
            passwordInput.addEventListener('input', (e) => {
                const strength = checkPasswordStrength(e.target.value);
                strengthDiv.innerHTML = `Password strength: <span class="${strength.class}">${strength.text}</span>`;
            });
            
            // Form submission
            const registerForm = document.getElementById('registerForm');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
                successDiv.classList.remove('show');
                setTimeout(() => errorDiv.classList.remove('show'), 5000);
            }
            
            function showSuccess(message) {
                successDiv.textContent = message;
                successDiv.classList.add('show');
                errorDiv.classList.remove('show');
                setTimeout(() => successDiv.classList.remove('show'), 3000);
            }
            
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const firstName = document.getElementById('firstName').value.trim();
                const lastName = document.getElementById('lastName').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const storeName = document.getElementById('storeName').value.trim();
                const country = document.getElementById('country').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const termsAgree = document.getElementById('termsAgree').checked;
                
                // Validation
                if (!firstName || !lastName || !email || !storeName || !password) {
                    showError('Please fill in all required fields');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showError('Passwords do not match');
                    return;
                }
                
                if (password.length < 8) {
                    showError('Password must be at least 8 characters');
                    return;
                }
                
                if (!termsAgree) {
                    showError('You must agree to the Terms of Service');
                    return;
                }
                
                // Simulate registration
                const registerBtn = document.getElementById('registerBtn');
                registerBtn.disabled = true;
                registerBtn.innerHTML = '<span class="loading-spinner"></span> Creating account...';
                
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Store user data
                const userData = {
                    id: Math.floor(Math.random() * 10000),
                    name: `${firstName} ${lastName}`,
                    email: email,
                    role: 'cashier',
                    tier: selectedPlan,
                    phone: phone,
                    storeName: storeName,
                    country: country
                };
                
                localStorage.setItem('pos_user', JSON.stringify({
                    id: userData.id,
                    name: userData.name,
                    email: userData.email,
                    role: userData.role,
                    tier: userData.tier
                }));
                
                localStorage.setItem('pos_user_profile', JSON.stringify(userData));
                
                showSuccess('Account created successfully! Redirecting to login...');
                
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
            });
        })();
    </script>
</body>
</html>
