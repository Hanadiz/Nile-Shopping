<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Nile Shopping POS - Login to your point of sale system">
    <title>Nile POS - Login</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 32px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #818cf8;
        }

        .tagline {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 8px;
        }

        .login-body {
            padding: 32px;
        }

        .tier-badge {
            background: #f1f5f9;
            border-radius: 100px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            color: #475569;
            display: inline-block;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        input.error {
            border-color: #ef4444;
        }

        .password-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .forgot-link {
            font-size: 12px;
            color: #818cf8;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .pin-option {
            margin: 16px 0;
            text-align: center;
        }

        .pin-toggle {
            background: none;
            border: none;
            color: #64748b;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .pin-toggle:hover {
            color: #818cf8;
        }

        .pin-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }

        .pin-digit {
            width: 60px;
            height: 70px;
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            background: white;
        }

        .pin-digit:focus {
            border-color: #818cf8;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 12px;
            color: #dc2626;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .register-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            font-size: 14px;
            color: #64748b;
        }

        .register-footer a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
        }

        .biometric-btn {
            width: 100%;
            padding: 12px;
            background: #f1f5f9;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .biometric-btn:hover {
            background: #e2e8f0;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .login-body {
                padding: 24px;
            }
            .pin-digit {
                width: 50px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">Nile<span>POS</span></div>
            <div class="tagline">Point of Sale System</div>
        </div>
        <div class="login-body">
            <div style="text-align: center;">
                <span class="tier-badge" id="tierBadge">Freemium</span>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <!-- Email/Password Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" placeholder="cashier@store.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="password-header">
                        <label>Password</label>
                        <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
                    </div>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            </form>

            <!-- PIN Login Form (hidden by default) -->
            <div id="pinForm" class="hidden">
                <div class="form-group">
                    <label>Enter Your PIN Code</label>
                    <div class="pin-inputs" id="pinInputs">
                        <input type="text" maxlength="1" class="pin-digit" data-idx="0">
                        <input type="text" maxlength="1" class="pin-digit" data-idx="1">
                        <input type="text" maxlength="1" class="pin-digit" data-idx="2">
                        <input type="text" maxlength="1" class="pin-digit" data-idx="3">
                    </div>
                </div>
                <button class="login-btn" id="pinLoginBtn">Verify PIN</button>
            </div>

            <!-- Toggle between login methods -->
            <div class="pin-option">
                <button type="button" class="pin-toggle" id="togglePinBtn">
                    <span>🔢</span> Use PIN instead
                </button>
            </div>

            <!-- Biometric Login (Professional tier+) -->
            <div id="biometricSection" class="hidden">
                <button type="button" class="biometric-btn" id="biometricBtn">
                    <span>👆</span> Use Fingerprint / Face ID
                </button>
            </div>

            <div class="register-footer">
                Don't have an account? <a href="#" id="registerLink">Start Free Trial</a>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // NILE POS - LOGIN CONTROLLER
        // Self-contained, production-ready
        // ============================================

        (function() {
            // DOM Elements
            const loginForm = document.getElementById('loginForm');
            const pinForm = document.getElementById('pinForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const pinLoginBtn = document.getElementById('pinLoginBtn');
            const togglePinBtn = document.getElementById('togglePinBtn');
            const errorDiv = document.getElementById('errorMessage');
            const tierBadge = document.getElementById('tierBadge');
            const biometricSection = document.getElementById('biometricSection');
            const biometricBtn = document.getElementById('biometricBtn');
            const forgotLink = document.getElementById('forgotLink');
            const registerLink = document.getElementById('registerLink');

            // State
            let isPinMode = false;
            let currentTier = 'freemium';
            let pinDigits = ['', '', '', ''];
            let lockUntil = null;

            // ============================================
            // TIER DETECTION
            // ============================================
            async function detectTier() {
                // Check URL params for demo mode
                const urlParams = new URLSearchParams(window.location.search);
                const demo = urlParams.get('demo');
                
                if (demo === 'premium') {
                    currentTier = 'premium';
                } else if (demo === 'professional') {
                    currentTier = 'professional';
                } else if (demo === 'enterprise') {
                    currentTier = 'enterprise';
                } else if (demo === 'basic') {
                    currentTier = 'basic';
                } else {
                    currentTier = 'freemium';
                }
                
                tierBadge.textContent = currentTier.charAt(0).toUpperCase() + currentTier.slice(1);
                
                // Show biometric for Professional+
                if (currentTier === 'professional' || currentTier === 'premium' || currentTier === 'enterprise') {
                    biometricSection.classList.remove('hidden');
                }
            }

            // ============================================
            // SHOW ERROR MESSAGE
            // ============================================
            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
                setTimeout(() => {
                    errorDiv.classList.remove('show');
                }, 5000);
            }

            // ============================================
            // CLEAR ERROR
            // ============================================
            function clearError() {
                errorDiv.classList.remove('show');
            }

            // ============================================
            // SET LOADING STATE
            // ============================================
            function setLoading(button, isLoading) {
                if (isLoading) {
                    button.disabled = true;
                    button.innerHTML = '<span class="loading-spinner"></span> Authenticating...';
                } else {
                    button.disabled = false;
                    button.innerHTML = button.id === 'pinLoginBtn' ? 'Verify PIN' : 'Sign In';
                }
            }

            // ============================================
            // CHECK ACCOUNT LOCKOUT
            // ============================================
            function isAccountLocked() {
                if (lockUntil && new Date() < lockUntil) {
                    const remaining = Math.ceil((lockUntil - new Date()) / 1000);
                    showError(`Too many failed attempts. Try again in ${remaining} seconds.`);
                    return true;
                }
                return false;
            }

            // ============================================
            // STORE AUTH TOKENS
            // ============================================
            function storeAuthData(data) {
                localStorage.setItem('pos_jwt', data.access_token);
                localStorage.setItem('pos_refresh_token', data.refresh_token);
                localStorage.setItem('pos_user', JSON.stringify(data.user));
                localStorage.setItem('pos_tier', data.tier);
                localStorage.setItem('pos_permissions', JSON.stringify(data.permissions));
                
                // Set session expiry (8 hours)
                const expires = new Date();
                expires.setHours(expires.getHours() + 8);
                localStorage.setItem('pos_session_expiry', expires.toISOString());
            }

            // ============================================
            // EMAIL/PASSWORD LOGIN
            // ============================================
            async function loginWithPassword(email, password) {
                if (isAccountLocked()) return false;
                
                // Demo mode - bypass actual API
                if (email === 'demo@nile.com' && password === 'demo123') {
                    storeAuthData({
                        access_token: 'demo_jwt_token_' + Date.now(),
                        refresh_token: 'demo_refresh_' + Date.now(),
                        user: { id: 1, name: 'Demo User', email: email, role: 'cashier' },
                        tier: currentTier,
                        permissions: ['transaction.create', 'transaction.read', 'product.read']
                    });
                    window.location.href = '/index.html';
                    return true;
                }
                
                // Real API call (commented for demo - uncomment for production)
                /*
                try {
                    const response = await fetch('/api/v1/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, tier: currentTier })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.message || 'Login failed');
                    }
                    
                    storeAuthData(data);
                    window.location.href = '/index.html';
                    return true;
                } catch (error) {
                    showError(error.message);
                    
                    // Track failed attempts for lockout
                    const failedCount = parseInt(localStorage.getItem('login_failures') || '0') + 1;
                    localStorage.setItem('login_failures', failedCount);
                    
                    if (failedCount >= 5) {
                        lockUntil = new Date(Date.now() + 15 * 60 * 1000); // 15 min lockout
                        localStorage.setItem('login_lockout', lockUntil.toISOString());
                    }
                    return false;
                }
                */
                
                // Demo fallback
                if (email && password) {
                    showError('Invalid credentials. Use demo@nile.com / demo123 for demo access.');
                    return false;
                }
                return false;
            }

            // ============================================
            // PIN LOGIN
            // ============================================
            async function loginWithPin(pin) {
                if (isAccountLocked()) return false;
                
                // Demo PIN (1234 works)
                if (pin === '1234') {
                    storeAuthData({
                        access_token: 'pin_jwt_token_' + Date.now(),
                        refresh_token: 'pin_refresh_' + Date.now(),
                        user: { id: 2, name: 'Cashier User', email: 'cashier@store.com', role: 'cashier' },
                        tier: currentTier,
                        permissions: ['transaction.create', 'transaction.read', 'product.read']
                    });
                    window.location.href = '/index.html';
                    return true;
                }
                
                showError('Invalid PIN. Try 1234 for demo.');
                return false;
            }

            // ============================================
            // BIOMETRIC LOGIN
            // ============================================
            async function loginWithBiometric() {
                // Check if WebAuthn is supported
                if (!window.PublicKeyCredential) {
                    showError('Biometric authentication is not supported on this device.');
                    return;
                }
                
                // Demo biometric simulation
                showError('Biometric authentication requires setup. Please login with password first.');
                
                // Real implementation would use WebAuthn API:
                /*
                try {
                    const credential = await navigator.credentials.get({
                        publicKey: {
                            challenge: new Uint8Array(32),
                            allowCredentials: []
                        }
                    });
                    // Verify with backend
                } catch (error) {
                    showError('Biometric verification failed');
                }
                */
            }

            // ============================================
            // PIN INPUT HANDLING
            // ============================================
            function setupPinInputs() {
                const inputs = document.querySelectorAll('.pin-digit');
                
                inputs.forEach((input, idx) => {
                    input.addEventListener('input', (e) => {
                        const value = e.target.value;
                        if (value.length === 1 && /^\d$/.test(value)) {
                            pinDigits[idx] = value;
                            if (idx < inputs.length - 1) {
                                inputs[idx + 1].focus();
                            } else {
                                // Auto-submit when all digits entered
                                const pin = pinDigits.join('');
                                if (pin.length === 4) {
                                    pinLoginBtn.click();
                                }
                            }
                        } else if (value.length === 0) {
                            pinDigits[idx] = '';
                        } else if (value.length > 1) {
                            // Handle paste
                            const pasted = value.slice(0, 4);
                            for (let i = 0; i < pasted.length && i < 4; i++) {
                                if (/^\d$/.test(pasted[i])) {
                                    pinDigits[i] = pasted[i];
                                    inputs[i].value = pasted[i];
                                }
                            }
                            if (pasted.length === 4) {
                                inputs[3].focus();
                                pinLoginBtn.click();
                            }
                        }
                    });
                    
                    input.addEventListener('keydown', (e) => {
                        if (e.key === 'Backspace' && !input.value && idx > 0) {
                            inputs[idx - 1].focus();
                            pinDigits[idx - 1] = '';
                            inputs[idx - 1].value = '';
                        }
                    });
                });
            }

            // ============================================
            // RESET PIN INPUTS
            // ============================================
            function resetPinInputs() {
                pinDigits = ['', '', '', ''];
                const inputs = document.querySelectorAll('.pin-digit');
                inputs.forEach(input => {
                    input.value = '';
                });
                if (inputs[0]) inputs[0].focus();
            }

            // ============================================
            // TOGGLE LOGIN MODE
            // ============================================
            function toggleLoginMode() {
                isPinMode = !isPinMode;
                
                if (isPinMode) {
                    loginForm.classList.add('hidden');
                    pinForm.classList.remove('hidden');
                    togglePinBtn.innerHTML = '<span>✉️</span> Use Email instead';
                    resetPinInputs();
                } else {
                    loginForm.classList.remove('hidden');
                    pinForm.classList.add('hidden');
                    togglePinBtn.innerHTML = '<span>🔢</span> Use PIN instead';
                }
            }

            // ============================================
            // FORGOT PASSWORD
            // ============================================
            async function handleForgotPassword() {
                const email = emailInput.value;
                if (!email) {
                    showError('Please enter your email address to reset password.');
                    return;
                }
                
                // Demo mode
                showError('Password reset link has been sent to ' + email + ' (demo)');
                
                // Real implementation:
                /*
                try {
                    const response = await fetch('/api/v1/auth/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const data = await response.json();
                    showError('Password reset email sent if account exists.');
                } catch (error) {
                    showError('Failed to send reset email');
                }
                */
            }

            // ============================================
            // REGISTER (FREEMIUM)
            // ============================================
            function handleRegister() {
                // Demo redirect to signup
                window.location.href = '/register.html';
            }

            // ============================================
            // CHECK EXISTING SESSION
            // ============================================
            function checkExistingSession() {
                const jwt = localStorage.getItem('pos_jwt');
                const expiry = localStorage.getItem('pos_session_expiry');
                
                if (jwt && expiry) {
                    const expiryDate = new Date(expiry);
                    if (expiryDate > new Date()) {
                        // Session still valid, redirect to POS
                        window.location.href = '/index.html';
                    } else {
                        // Session expired, clear storage
                        localStorage.removeItem('pos_jwt');
                        localStorage.removeItem('pos_refresh_token');
                        localStorage.removeItem('pos_user');
                        localStorage.removeItem('pos_session_expiry');
                    }
                }
                
                // Check for lockout from previous sessions
                const savedLockout = localStorage.getItem('login_lockout');
                if (savedLockout) {
                    const lockoutDate = new Date(savedLockout);
                    if (lockoutDate > new Date()) {
                        lockUntil = lockoutDate;
                    } else {
                        localStorage.removeItem('login_lockout');
                        localStorage.removeItem('login_failures');
                    }
                }
            }

            // ============================================
            // FORM SUBMIT HANDLERS
            // ============================================
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearError();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                
                if (!email || !password) {
                    showError('Please enter both email and password');
                    return;
                }
                
                setLoading(loginBtn, true);
                await loginWithPassword(email, password);
                setLoading(loginBtn, false);
            });
            
            pinLoginBtn.addEventListener('click', async () => {
                clearError();
                const pin = pinDigits.join('');
                
                if (pin.length !== 4) {
                    showError('Please enter your 4-digit PIN');
                    return;
                }
                
                setLoading(pinLoginBtn, true);
                await loginWithPin(pin);
                setLoading(pinLoginBtn, false);
            });
            
            togglePinBtn.addEventListener('click', toggleLoginMode);
            
            forgotLink.addEventListener('click', (e) => {
                e.preventDefault();
                handleForgotPassword();
            });
            
            registerLink.addEventListener('click', (e) => {
                e.preventDefault();
                handleRegister();
            });
            
            if (biometricBtn) {
                biometricBtn.addEventListener('click', () => {
                    loginWithBiometric();
                });
            }
            
            // Enter key on pin inputs
            document.addEventListener('keydown', (e) => {
                if (isPinMode && e.key === 'Enter') {
                    const pin = pinDigits.join('');
                    if (pin.length === 4) {
                        pinLoginBtn.click();
                    }
                }
            });
            
            // ============================================
            // INITIALIZATION
            // ============================================
            function init() {
                detectTier();
                checkExistingSession();
                setupPinInputs();
                
                // Auto-focus email field
                emailInput.focus();
                
                // Demo credentials hint
                console.log('Demo Login: demo@nile.com / demo123 | PIN: 1234');
            }
            
            init();
        })();
    </script>
</body>
</html>
