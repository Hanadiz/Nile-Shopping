
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile POS - Price Check</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            color: white;
            font-size: 28px;
        }
        .back-link {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
        }
        .scan-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            text-align: center;
        }
        .barcode-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .scan-input {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            margin-bottom: 20px;
            font-family: monospace;
            letter-spacing: 2px;
        }
        .scan-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .or-divider {
            color: #94a3b8;
            margin: 20px 0;
            font-size: 14px;
        }
        .manual-sku {
            display: flex;
            gap: 12px;
        }
        .manual-sku input {
            flex: 1;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }
        .check-btn {
            padding: 14px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .result-card {
            margin-top: 24px;
            padding: 24px;
            background: #f8fafc;
            border-radius: 20px;
            display: none;
        }
        .result-card.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .product-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .product-price { font-size: 36px; font-weight: 700; color: #667eea; margin: 16px 0; }
        .product-details { color: #64748b; font-size: 14px; margin-top: 12px; }
        .recent-list {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        .recent-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
        }
        .recent-item:hover { background: #f1f5f9; }
        .clear-history {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 12px;
            cursor: pointer;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/index.html" class="back-link">← Back to Register</a>
            <h1>🔍 Price Check</h1>
        </div>
        
        <div class="scan-card">
            <div class="barcode-icon">📷</div>
            <input type="text" id="barcodeInput" class="scan-input" placeholder="Scan barcode here" autofocus>
            <div class="or-divider">— OR —</div>
            <div class="manual-sku">
                <input type="text" id="skuInput" placeholder="Enter SKU or product name">
                <button class="check-btn" id="checkBtn">Check</button>
            </div>
            
            <div id="resultCard" class="result-card">
                <div id="productInfo"></div>
                <button id="addToCartBtn" style="width:100%; margin-top:16px; padding:12px; background:#10b981; color:white; border:none; border-radius:12px; cursor:pointer;">+ Add to Cart</button>
            </div>
            
            <div class="recent-list">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong>Recent Checks</strong>
                    <button class="clear-history" id="clearHistoryBtn">Clear</button>
                </div>
                <div id="recentHistory"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const products = [
                { id: 1, sku: 'PRD-001', name: 'Classic T-Shirt', price: 29.99, category: 'Apparel', stock: 48, barcode: '8901234567890' },
                { id: 2, sku: 'PRD-002', name: 'Slim Fit Jeans', price: 59.99, category: 'Apparel', stock: 35, barcode: '8901234567891' },
                { id: 3, sku: 'PRD-003', name: 'Running Shoes', price: 89.99, category: 'Footwear', stock: 12, barcode: '8901234567892' },
                { id: 4, sku: 'PRD-004', name: 'Leather Wallet', price: 39.99, category: 'Accessories', stock: 45, barcode: '8901234567893' },
                { id: 5, sku: 'PRD-005', name: 'Smart Watch', price: 199.99, category: 'Electronics', stock: 8, barcode: '8901234567894' }
            ];
            
            let recentChecks = [];
            
            function loadRecentChecks() {
                const saved = localStorage.getItem('price_check_history');
                if (saved) recentChecks = JSON.parse(saved);
                renderRecentChecks();
            }
            
            function saveRecentChecks() {
                localStorage.setItem('price_check_history', JSON.stringify(recentChecks.slice(0, 10)));
            }
            
            function addToRecent(product) {
                recentChecks = recentChecks.filter(p => p.id !== product.id);
                recentChecks.unshift(product);
                saveRecentChecks();
                renderRecentChecks();
            }
            
            function renderRecentChecks() {
                const container = document.getElementById('recentHistory');
                if (recentChecks.length === 0) {
                    container.innerHTML = '<div style="padding: 20px; text-align: center; color: #94a3b8;">No recent checks</div>';
                    return;
                }
                container.innerHTML = recentChecks.map(p => `
                    <div class="recent-item" data-id="${p.id}">
                        <span><strong>${escapeHtml(p.name)}</strong><br><small>${p.sku}</small></span>
                        <span style="font-weight:700; color:#667eea;">$${p.price.toFixed(2)}</span>
                    </div>
                `).join('');
                
                document.querySelectorAll('.recent-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const id = parseInt(el.dataset.id);
                        const product = products.find(p => p.id === id);
                        if (product) displayProduct(product);
                    });
                });
            }
            
            function findProduct(query) {
                query = query.toLowerCase().trim();
                return products.find(p => 
                    p.sku.toLowerCase() === query ||
                    p.barcode === query ||
                    p.name.toLowerCase().includes(query)
                );
            }
            
            function displayProduct(product) {
                if (!product) {
                    document.getElementById('productInfo').innerHTML = `
                        <div style="text-align:center; color:#ef4444;">
                            <div style="font-size:48px;">❌</div>
                            <div>Product not found</div>
                        </div>
                    `;
                    document.getElementById('resultCard').classList.add('show');
                    return;
                }
                
                addToRecent(product);
                
                const stockStatus = product.stock <= 0 ? 'Out of Stock' : product.stock < 20 ? `Only ${product.stock} left!` : `In Stock (${product.stock})`;
                const stockColor = product.stock <= 0 ? '#ef4444' : product.stock < 20 ? '#f59e0b' : '#10b981';
                
                document.getElementById('productInfo').innerHTML = `
                    <div class="product-name">${escapeHtml(product.name)}</div>
                    <div class="product-details">SKU: ${product.sku} | Category: ${product.category}</div>
                    <div class="product-price">$${product.price.toFixed(2)}</div>
                    <div style="color: ${stockColor};">${stockStatus}</div>
                `;
                document.getElementById('resultCard').classList.add('show');
                
                document.getElementById('addToCartBtn').onclick = () => {
                    addToCart(product);
                };
            }
            
            function addToCart(product) {
                if (product.stock <= 0) {
                    showToast('Cannot add out of stock item to cart', 'error');
                    return;
                }
                
                let cart = JSON.parse(localStorage.getItem('pos_cart') || '[]');
                const existing = cart.find(item => item.id === product.id);
                
                if (existing) {
                    existing.quantity += 1;
                    existing.lineTotal = existing.quantity * existing.price;
                } else {
                    cart.push({
                        id: product.id,
                        sku: product.sku,
                        name: product.name,
                        price: product.price,
                        quantity: 1,
                        lineTotal: product.price
                    });
                }
                
                localStorage.setItem('pos_cart', JSON.stringify(cart));
                showToast(`Added ${product.name} to cart`, 'success');
                window.dispatchEvent(new CustomEvent('cartUpdated'));
            }
            
            function checkProduct() {
                const barcode = document.getElementById('barcodeInput').value.trim();
                const sku = document.getElementById('skuInput').value.trim();
                const query = barcode || sku;
                
                if (!query) {
                    showToast('Enter a barcode or SKU', 'error');
                    return;
                }
                
                const product = findProduct(query);
                displayProduct(product);
                
                // Clear inputs
                document.getElementById('barcodeInput').value = '';
                document.getElementById('skuInput').value = '';
                document.getElementById('barcodeInput').focus();
            }
            
            function showToast(message, type) {
                const toast = document.createElement('div');
                toast.textContent = message;
                toast.style.cssText = `
                    position: fixed; bottom: 20px; right: 20px;
                    background: ${type === 'error' ? '#ef4444' : '#10b981'};
                    color: white; padding: 12px 20px; border-radius: 12px;
                    z-index: 1000; animation: slideIn 0.3s ease;
                `;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
            
            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
            
            // Barcode scanner via keyboard wedge
            let scannerBuffer = '';
            let scannerTimeout = null;
            
            function setupBarcodeScanner() {
                document.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    
                    if (e.key === 'Enter') {
                        if (scannerBuffer.length > 0) {
                            document.getElementById('barcodeInput').value = scannerBuffer;
                            checkProduct();
                            scannerBuffer = '';
                            clearTimeout(scannerTimeout);
                            e.preventDefault();
                        }
                    } else if (e.key.length === 1) {
                        clearTimeout(scannerTimeout);
                        scannerBuffer += e.key;
                        scannerTimeout = setTimeout(() => {
                            scannerBuffer = '';
                        }, 50);
                    }
                });
            }
            
            function init() {
                loadRecentChecks();
                setupBarcodeScanner();
                document.getElementById('checkBtn').addEventListener('click', checkProduct);
                document.getElementById('barcodeInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkProduct();
                });
                document.getElementById('skuInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkProduct();
                });
                document.getElementById('clearHistoryBtn').addEventListener('click', () => {
                    recentChecks = [];
                    saveRecentChecks();
                    renderRecentChecks();
                    showToast('History cleared', 'success');
                });
            }
            
            init();
        })();
    </script>
</body>
</html>
