<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Nile POS</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <link rel="stylesheet" href="/assets/css/auth.css">
    <style>
        .security-note {
            background: #fef3c7;
            border-left: 4px solid var(--warning);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">Nile<span>POS</span></div>
            <div class="tagline">Change your password</div>
        </div>
        
        <div class="auth-body">
            <div class="security-note">
                🔒 For your security, we recommend using a strong, unique password.
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="changePasswordForm">
                <div class="form-group">
                    <label>Current Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="currentPassword" placeholder="Enter your current password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                    </div>
                    <div id="passwordStrength" class="password-strength"></div>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                </div>
                <button type="submit" class="btn" id="changeBtn">Change Password</button>
            </form>
            
            <div class="auth-footer">
                <a href="/profile.html">← Back to Profile</a>
            </div>
        </div>
    </div>
    
    <script src="/assets/js/rbac.js"></script>
    <script>
        // Check authentication
        if (!window.rbac.isAuthenticated()) {
            window.location.href = '/login.html';
        }
        
        const currentPassword = document.getElementById('currentPassword');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const changeBtn = document.getElementById('changeBtn');
        const strengthDiv = document.getElementById('passwordStrength');
        
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^A-Za-z0-9]/)) strength++;
            
            if (strength <= 1) return { text: 'Weak', class: 'strength-weak' };
            if (strength <= 2) return { text: 'Medium', class: 'strength-medium' };
            return { text: 'Strong', class: 'strength-strong' };
        }
        
        newPassword.addEventListener('input', (e) => {
            const strength = checkPasswordStrength(e.target.value);
            strengthDiv.innerHTML = `Password strength: <span class="${strength.class}">${strength.text}</span>`;
        });
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            successDiv.classList.remove('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.classList.add('show');
            errorDiv.classList.remove('show');
            setTimeout(() => successDiv.classList.remove('show'), 3000);
        }
        
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const current = currentPassword.value;
            const newPwd = newPassword.value;
            const confirm = confirmPassword.value;
            
            if (!current || !newPwd || !confirm) {
                showError('Please fill in all fields');
                return;
            }
            
            if (newPwd !== confirm) {
                showError('New passwords do not match');
                return;
            }
            
            if (newPwd.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }
            
            changeBtn.disabled = true;
            changeBtn.innerHTML = '<span class="loading-spinner"></span> Changing...';
            
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            showSuccess('Password changed successfully!');
            changeBtn.disabled = false;
            changeBtn.innerHTML = 'Change Password';
            
            setTimeout(() => {
                window.location.href = '/profile.html';
            }, 2000);
        });
    </script>
</body>
</html>
