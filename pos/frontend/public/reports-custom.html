<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile POS - Custom Reports</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f5f9;
            padding: 24px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        h1 { font-size: 24px; color: #1e293b; }
        .back-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: #475569;
        }
        .builder-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }
        .builder-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        .preview-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        .field-list { margin: 16px 0; }
        .field-item {
            padding: 10px;
            margin: 6px 0;
            background: #f8fafc;
            border-radius: 8px;
            cursor: move;
            display: flex;
            justify-content: space-between;
        }
        .selected-fields { min-height: 200px; border: 2px dashed #e2e8f0; border-radius: 12px; padding: 12px; margin: 16px 0; }
        .selected-field {
            padding: 8px;
            margin: 4px 0;
            background: #e0e7ff;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }
        .run-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; }
        .export-btns { display: flex; gap: 12px; margin-top: 16px; }
        .export-csv, .export-pdf { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; }
        .export-csv { background: #10b981; color: white; }
        .export-pdf { background: #ef4444; color: white; }
        @media (max-width: 768px) {
            .builder-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Custom Report Builder</h1>
            <a href="/index.html" class="back-btn">← Back</a>
        </div>

        <div class="builder-grid">
            <div class="builder-panel">
                <h3>Available Fields</h3>
                <div class="field-list">
                    <div class="field-item" data-field="date">📅 Date</div>
                    <div class="field-item" data-field="transaction_id">🆔 Transaction ID</div>
                    <div class="field-item" data-field="product_name">📦 Product Name</div>
                    <div class="field-item" data-field="quantity">🔢 Quantity</div>
                    <div class="field-item" data-field="price">💰 Price</div>
                    <div class="field-item" data-field="total">💵 Total</div>
                    <div class="field-item" data-field="customer">👤 Customer</div>
                    <div class="field-item" data-field="cashier">👨‍💼 Cashier</div>
                </div>
                
                <h3>Selected Fields</h3>
                <div id="selectedFields" class="selected-fields"></div>
                
                <button id="runReportBtn" class="run-btn">▶ Run Report</button>
            </div>

            <div class="preview-panel">
                <h3>Report Preview</h3>
                <div id="reportPreview">
                    <div style="text-align:center; color:#94a3b8; padding:40px;">Select fields and click Run Report</div>
                </div>
                <div id="exportButtons" class="export-btns" style="display:none;">
                    <button id="exportCSV" class="export-csv">📎 Export CSV</button>
                    <button id="exportPDF" class="export-pdf">📄 Export PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let selectedFields = ['date', 'transaction_id', 'product_name', 'quantity', 'total'];
            
            const demoData = [
                { date: '2024-01-15', transaction_id: 'TRX-001', product_name: 'Classic T-Shirt', quantity: 2, price: 29.99, total: 59.98, customer: 'John Doe', cashier: 'John C' },
                { date: '2024-01-15', transaction_id: 'TRX-001', product_name: 'Running Shoes', quantity: 1, price: 89.99, total: 89.99, customer: 'John Doe', cashier: 'John C' },
                { date: '2024-01-15', transaction_id: 'TRX-002', product_name: 'Smart Watch', quantity: 1, price: 199.99, total: 199.99, customer: 'Jane Smith', cashier: 'Jane M' },
                { date: '2024-01-14', transaction_id: 'TRX-003', product_name: 'Leather Wallet', quantity: 1, price: 39.99, total: 39.99, customer: 'Bob Johnson', cashier: 'John C' }
            ];
            
            function renderSelectedFields() {
                const container = document.getElementById('selectedFields');
                container.innerHTML = selectedFields.map(field => `
                    <div class="selected-field" data-field="${field}">
                        ${field.replace('_', ' ').toUpperCase()}
                        <button class="remove-field" data-field="${field}">✕</button>
                    </div>
                `).join('');
                
                document.querySelectorAll('.remove-field').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const field = btn.dataset.field;
                        selectedFields = selectedFields.filter(f => f !== field);
                        renderSelectedFields();
                    });
                });
            }
            
            function runReport() {
                const tableHtml = `
                    <table>
                        <thead><tr>${selectedFields.map(f => `<th>${f.replace('_', ' ').toUpperCase()}</th>`).join('')}</thead>
                        <tbody>
                            ${demoData.map(row => `
                                <tr>${selectedFields.map(f => `<td>${row[f] || '—'}</td>`).join('')}</tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('reportPreview').innerHTML = tableHtml;
                document.getElementById('exportButtons').style.display = 'flex';
            }
            
            function exportCSV() {
                const headers = selectedFields.join(',');
                const rows = demoData.map(row => selectedFields.map(f => row[f] || '').join(','));
                const csv = [headers, ...rows].join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `report_${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                URL.revokeObjectURL(url);
            }
            
            function init() {
                renderSelectedFields();
                
                document.querySelectorAll('.field-item').forEach(field => {
                    field.addEventListener('click', () => {
                        const fieldName = field.dataset.field;
                        if (!selectedFields.includes(fieldName)) {
                            selectedFields.push(fieldName);
                            renderSelectedFields();
                        }
                    });
                });
                
                document.getElementById('runReportBtn').addEventListener('click', runReport);
                document.getElementById('exportCSV').addEventListener('click', exportCSV);
                document.getElementById('exportPDF').addEventListener('click', () => {
                    alert('PDF export would generate a PDF document');
                    window.print();
                });
            }
            
            init();
        })();
    </script>
</body>
</html>
